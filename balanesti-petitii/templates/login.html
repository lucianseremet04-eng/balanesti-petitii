{% extends "layouts/base.html" %}
{% block title %}Autentificare funcționari - Primăria Bălănești{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">

      <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" width="56" height="56" alt="Stema Primăriei Bălănești" class="mb-2">
        <h2 class="pb-section-title">Autentificare funcționari</h2>
        <p class="text-muted">Acces rezervat personalului Primăriei Bălănești</p>
      </div>

      <div class="pb-form-card">
        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label for="username" class="form-label">Utilizator</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Introduceți utilizatorul">
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Parolă</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
            </div>
          </div>
          <button type="submit" class="btn btn-pb-primary w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Conectare
          </button>
        </form>
      </div>

      <p class="text-center mt-3">
        <a href="{{ url_for('index') }}"><i class="bi bi-arrow-left me-1"></i>Înapoi la pagina principală</a>
      </p>

    </div>
  </div>
</section>
{% endblock %}
